# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# APLICAÇÃO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.application.name=admin-mydelivery-api
# Railway injeta PORT. Local sem PORT usa 8090 (8080 é do projeto principal em dev).
server.port=${PORT:8090}
# .env local opcional (raiz do projeto). Em prod, env vars direto no Railway.
spring.config.import=optional:file:./.env[.properties]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DATASOURCE 1 — ADMIN (escrita) — banco "admin_mydelivery"
# Mesmo plugin MySQL do Railway, database diferente.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.datasource.admin.jdbc-url=${DB_URL_ADMIN:jdbc:mysql://localhost:3306/admin_mydelivery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.admin.username=${DB_USERNAME_ADMIN:root}
spring.datasource.admin.password=${DB_PASSWORD_ADMIN:}
spring.datasource.admin.driver-class-name=com.mysql.cj.jdbc.Driver

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DATASOURCE 2 — MAIN (LEITURA only) — banco do MyDelivery principal
# Pega tudo de restaurantes, pedidos, pagamentos.
# Em produção: aponta pro mesmo plugin MySQL do Railway, database "railway" (ou o nome
# que o plugin atribuiu — ${{MySQL.MYSQLDATABASE}}).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.datasource.main.jdbc-url=${DB_URL_MAIN:jdbc:mysql://localhost:3306/mydelivery_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.main.username=${DB_USERNAME_MAIN:root}
spring.datasource.main.password=${DB_PASSWORD_MAIN:}
spring.datasource.main.driver-class-name=com.mysql.cj.jdbc.Driver

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JPA — auto-config DESLIGADA (configuramos manualmente em DataSourceAdminConfig
# e DataSourceMainConfig porque temos 2 datasources separados).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JWT do admin
# Em produção: ADMIN_JWT_SECRET vem do env (Base64, mínimo 256 bits / 32 bytes).
# Gerar: openssl rand -base64 64
# Default abaixo é APENAS pra dev local não quebrar — Base64 válido placeholder.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.jwt.secret=${ADMIN_JWT_SECRET:ZGV2QWRtaW5TZWNyZXRSZXBsYWNlSW5Qcm9kdWN0aW9uRW52VmFyVHJvY2VBbnRlc0RlRGVwbG95YXIxMjM0NTY3ODkwQUJDREVGRw==}
admin.jwt.expiration=${ADMIN_JWT_EXPIRATION:28800000}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CORS — domínios do frontend admin
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.cors.allowed-origins=${ADMIN_CORS_ORIGINS:https://admin.mydeliveryfood.com.br,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# UPLOADS de tickets (anexos do suporte) — Cloudinary igual o main
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
admin.cloudinary.api-key=${CLOUDINARY_API_KEY:}
admin.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Scheduler — pra auto-correção e health checks periódicos
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.task.scheduling.enabled=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Monitoramento (Fase 2)
#  - ciclo.initial-delay-ms: espera após boot antes do 1º ciclo
#  - ciclo.fixed-delay-ms:   intervalo entre ciclos (default 5min = 300000)
#  - purge.cron:             quando limpar snapshots antigos (default 03h)
# Em dev, deixa o intervalo curto pra testar; em prod, 5min tá bom.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.monitor.ciclo.initial-delay-ms=${ADMIN_MONITOR_INITIAL_DELAY_MS:30000}
admin.monitor.ciclo.fixed-delay-ms=${ADMIN_MONITOR_FIXED_DELAY_MS:300000}
admin.monitor.purge.cron=${ADMIN_MONITOR_PURGE_CRON:0 0 3 * * *}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Auto-correção (Fase 3)
#  - initial-delay-ms: espera após boot antes do 1º processamento
#  - fixed-delay-ms:   intervalo entre lotes (default 60s)
# Quanto menor, mais responsivo, mas em prod 1min é suficiente.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.recovery.initial-delay-ms=${ADMIN_RECOVERY_INITIAL_DELAY_MS:45000}
admin.recovery.fixed-delay-ms=${ADMIN_RECOVERY_FIXED_DELAY_MS:60000}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Faturamento (Fase 4)
#  - gerar.cron:   gera faturas mensais (default dia 1 às 06h)
#  - vencer.cron:  marca PENDENTES vencidas como VENCIDA (default diário 02h)
# Cron format Spring: sec min hora dia mês dia-semana
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.faturamento.gerar.cron=${ADMIN_FATURAMENTO_GERAR_CRON:0 0 6 1 * *}
admin.faturamento.vencer.cron=${ADMIN_FATURAMENTO_VENCER_CRON:0 0 2 * * *}
admin.faturamento.inadimplencia.cron=${ADMIN_FATURAMENTO_INADIMPLENCIA_CRON:0 30 2 * * *}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Mercado Pago do ADMIN (cobrança SaaS — diferente do MP de cada restaurante)
#  - access-token: gere em https://www.mercadopago.com.br/developers (Suas integrações)
#  - webhook-secret: chave compartilhada pra validar webhooks (opcional, recomendado)
#  - payer-default-email: usado em payer.email do payload PIX (MP exige, pode ser genérico)
#  - public-base-url: URL pública do admin-api pra MP enviar webhooks (ex.: https://api-admin.mydeliveryfood.com.br)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.mp.access-token=${ADMIN_MP_ACCESS_TOKEN:}
admin.mp.webhook-secret=${ADMIN_MP_WEBHOOK_SECRET:}
admin.mp.api-base=${ADMIN_MP_API_BASE:https://api.mercadopago.com}
admin.mp.payer-default-email=${ADMIN_MP_PAYER_EMAIL:billing@mydeliveryfood.com.br}
admin.public-base-url=${ADMIN_PUBLIC_BASE_URL:http://localhost:8090}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Inadimplência (Fase 4b)
#  - dias-tolerancia: fatura VENCIDA mais antiga do restaurante > N dias → bloqueia
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
admin.inadimplencia.dias-tolerancia=${ADMIN_INADIMPLENCIA_DIAS:7}

# Jackson — não falhar em propriedades desconhecidas no JSON
spring.jackson.deserialization.fail-on-unknown-properties=false

admin.cors.allowed-origins=http://127.0.0.1:5501,http://localhost:5501
